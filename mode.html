<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pong — Select Mode</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .mode-hero { position: relative; height: calc(100vh - 40px); display:flex; align-items:center; justify-content:center; }
    .mode-card { z-index:2; text-align:center; color:#fff; }
    .mode-title { font-size:2rem; margin-bottom:18px; letter-spacing:0.08em; }
    .mode-grid { display:flex; gap:24px; justify-content:center; }
    .mode-box { background:linear-gradient(135deg,#1f8efd,#22c55e); padding:20px 36px; border-radius:12px; font-size:1.25rem; color:#fff; text-decoration:none; box-shadow:0 8px 20px rgba(0,0,0,.5); transition:all 0.3s ease; }
    .mode-box:hover { transform:translateY(-4px); box-shadow:0 12px 28px rgba(31,142,253,0.6); }
    .mode-box.secondary { background:linear-gradient(135deg,#22c55e,#1f8efd); }
  </style>
</head>
<body>
  <div class="container">
    <div class="mode-hero">
      <svg class="bg-svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <rect width="800" height="500" fill="black" />
        <g transform="translate(0,60)">
          <rect x="40" y="40" width="12" height="120" rx="3" fill="#1f8efd" />
          <rect x="708" y="40" width="12" height="120" rx="3" fill="#22c55e" />
          <circle cx="400" cy="100" r="9" fill="#fff" />
        </g>
        <g transform="translate(0,280)">
          <rect x="40" y="40" width="12" height="120" rx="3" fill="#22c55e" />
          <rect x="708" y="40" width="12" height="120" rx="3" fill="#1f8efd" />
          <circle cx="400" cy="100" r="9" fill="#fff" />
        </g>
      </svg>

      <div class="mode-card">
        <div class="mode-title">SELECT YOUR MODE</div>
        <div class="mode-grid">
          <a class="mode-box" href="single.html">SINGLE</a>
          <a class="mode-box secondary" href="multiplayer.html">MULTIPLAYER</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
